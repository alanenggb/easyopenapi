name: Build e Release
on:
  push:
    branches:
      - main
    paths:
      - 'src-tauri/tauri.conf.json'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}

      - name: Install dependencies
        run: npm install

      - name: Install Dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Build and Package
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: easyopenapi-v__VERSION__
          releaseName: "EasyOpenAPI v__VERSION__"
          releaseDraft: true
          prerelease: false

      - name: Generate and upload latest.json for updater
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # Get version from tauri.conf.json
          $VERSION = node -p "require('./src-tauri/tauri.conf.json').version"
          Write-Host "Generating latest.json for version $VERSION"
          
          # Create latest.json using Node.js (works on all platforms)
          # Use single quotes in PowerShell to avoid interpolation
          node -e 'const fs = require("fs"); const version = process.env.VERSION; const latestJson = { version: version, notes: "EasyOpenAPI v" + version, pub_date: new Date().toISOString(), platforms: { "windows-x86_64": { signature: "", url: "https://github.com/alanenggb/easyopenapi/releases/download/easyopenapi-v" + version + "/EasyOpenAPI_" + version + "_x64-setup.exe" }, "darwin-x86_64": { signature: "", url: "https://github.com/alanenggb/easyopenapi/releases/download/easyopenapi-v" + version + "/EasyOpenAPI_" + version + "_x64.dmg" }, "darwin-aarch64": { signature: "", url: "https://github.com/alanenggb/easyopenapi/releases/download/easyopenapi-v" + version + "/EasyOpenAPI_" + version + "_aarch64.dmg" }, "linux-x86_64": { signature: "", url: "https://github.com/alanenggb/easyopenapi/releases/download/easyopenapi-v" + version + "/easyopenapi_" + version + "_amd64.AppImage" } } }; fs.writeFileSync("latest.json", JSON.stringify(latestJson, null, 2)); console.log("latest.json created successfully");' -e VERSION="$VERSION"
          
          # Upload latest.json to the release
          gh release upload "easyopenapi-v$VERSION" latest.json --repo alanenggb/easyopenapi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}